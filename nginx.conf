# ── M-04: server_tokens off hides nginx version from error responses ─────────
server_tokens off;

server {
    # Changed from 80 → 8080 so nginx worker processes can run as the
    # non-privileged `nginx` user (port 80 requires root to bind).
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # ── Hashed static assets: cache immutably (1 year) ───────────────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── SPA fallback ──────────────────────────────────────────────────────────
    # Any URL that isn't a real file serves index.html so client-side routing
    # works correctly on direct navigation / page refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Content-Type-Options  "nosniff"                        always;
    add_header X-Frame-Options         "SAMEORIGIN"                     always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection        "1; mode=block"                  always;

    add_header Permissions-Policy
        "geolocation=(self), camera=(), microphone=(), payment=(), usb=()"
        always;

    add_header Content-Security-Policy
        "default-src 'none'; script-src 'self' 'unsafe-inline' cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' cdnjs.cloudflare.com; img-src 'self' data: blob: *.openstreetmap.org *.tile.openstreetmap.org *.basemaps.cartocdn.com; connect-src 'self' *.openstreetmap.org *.basemaps.cartocdn.com; font-src 'self' data:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'"
        always;

    # S-10: HSTS
    add_header Strict-Transport-Security
        "max-age=63072000; includeSubDomains; preload"
        always;
}
