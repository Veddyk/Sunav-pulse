# ─────────────────────────────────────────────────────────────────────────────
# Local development / testing only. Production uses Vercel (frontend),
# Railway (backend), and Supabase (database) — see DEPLOYMENT.md.
#
# Run:  docker compose up --build
# Frontend: http://localhost:8081
# Backend:  http://localhost:8080
# ─────────────────────────────────────────────────────────────────────────────
version: "3.9"

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      # nginx now listens on 8080 internally (non-root); host maps to 8081
      - "8081:8080"
    depends_on:
      - backend
    environment:
      - VITE_API_BASE_URL=http://localhost:8080

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - FRONTEND_ORIGIN=http://localhost:8081
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/sunav_pulse
      - NODE_ENV=development
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=sunav_pulse
    ports:
      - "5432:5432"
    volumes:
      - sunav_pg_data:/var/lib/postgresql/data
      - ./supabase/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  sunav_pg_data:
